<svg viewBox="0 0 400 220" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <rect x="3" y="3" width="394" height="214" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <!-- garis lurus A-O-B -->
  <line x1="50" y1="160" x2="350" y2="160" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
  <!-- sinar O-C (55° di atas horizontal, sehingga AOC = 125°) -->
  <line x1="200" y1="160" x2="286" y2="37" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
  <!-- busur sudut AOC = 125° -->
  <path d="M 155 160 A 45 45 0 0 0 226 123" fill="none" stroke="#6366f1" stroke-width="2.5"/>
  <!-- busur sudut BOC = x° -->
  <path d="M 255 160 A 55 55 0 0 0 231 115" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <!-- titik -->
  <circle cx="50" cy="160" r="4" fill="#334155"/>
  <circle cx="200" cy="160" r="4.5" fill="#334155"/>
  <circle cx="350" cy="160" r="4" fill="#334155"/>
  <circle cx="286" cy="37" r="4" fill="#334155"/>
  <!-- label titik -->
  <text x="40" y="152" font-size="16" font-weight="700" fill="#334155">A</text>
  <text x="196" y="184" font-size="16" font-weight="700" fill="#334155">O</text>
  <text x="356" y="152" font-size="16" font-weight="700" fill="#334155">B</text>
  <text x="294" y="34" font-size="16" font-weight="700" fill="#334155">C</text>
  <!-- label sudut -->
  <text x="132" y="128" font-size="15" font-weight="700" fill="#6366f1">125°</text>
  <text x="244" y="140" font-size="16" font-weight="700" fill="#f59e0b">x°</text>
</svg>
